<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>登录界面·Liquid Glass 方案 v2</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{height:100%;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;
    background-color:#08222b;
    background:
      radial-gradient(48% 34% at 50% 4%, rgba(240,197,107,.34) 0%, transparent 62%),
      radial-gradient(60% 45% at 14% 16%, rgba(45,120,140,.5) 0%, transparent 60%),
      radial-gradient(55% 42% at 90% 22%, rgba(213,162,60,.2) 0%, transparent 58%),
      radial-gradient(70% 55% at 82% 100%, rgba(20,90,110,.42) 0%, transparent 60%),
      linear-gradient(165deg,#0d3947 0%,#0E3947 28%,#0a2b35 64%,#061c24 100%);
  }
  .phone{width:100%;max-width:400px;position:relative;}
  .orb{position:absolute;border-radius:50%;filter:blur(48px);z-index:0;pointer-events:none;}
  .orb.a{width:210px;height:210px;background:#1f7d8e;opacity:.42;top:40px;left:-60px;}
  .orb.b{width:200px;height:200px;background:#d5a23c;opacity:.22;top:-30px;right:-40px;}
  .sparkle{position:absolute;width:4px;height:4px;border-radius:50%;background:#f4d488;box-shadow:0 0 8px 1px rgba(244,212,136,.7);z-index:0;opacity:.7;}

  .wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}

  /* ===== VIP member emblem (English only) ===== */
  .emblem{text-align:center;margin:12px 0 22px;position:relative;}
  .vip{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:50px;font-weight:800;letter-spacing:.16em;line-height:1;
    background:linear-gradient(178deg,#FBEFC4 0%,#F0C56B 34%,#DBA53C 62%,#B07E22 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.45));
    padding-left:.16em;margin-bottom:2px;
  }
  .emblem img{width:236px;height:auto;filter:brightness(0) invert(1) drop-shadow(0 8px 16px rgba(0,0,0,.4));}

  /* ===== liquid glass card ===== */
  .card{
    position:relative;width:100%;padding:28px 24px 26px;border-radius:30px;overflow:hidden;
    background:linear-gradient(160deg, rgba(255,255,255,.13) 0%, rgba(255,255,255,.05) 42%, rgba(255,255,255,.03) 100%);
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 30px 60px rgba(0,0,0,.45), 0 2px 0 rgba(255,255,255,.09) inset, 0 -18px 40px rgba(0,0,0,.1) inset;
    backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);
  }
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.15) 0%, rgba(255,255,255,.02) 60%, transparent 100%);
    border-radius:30px 30px 55% 55%;}
  .card > *{position:relative;z-index:1;}

  .h-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .h-row h1{font-size:30px;font-weight:800;color:#fff;letter-spacing:.05em;}
  .tag{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:#3a2a07;padding:4px 10px;border-radius:100px;
    background:linear-gradient(100deg,#F3E0B0,#E9C56B);box-shadow:0 3px 9px rgba(213,162,60,.3);white-space:nowrap;}
  .sub{font-size:13px;color:rgba(234,244,242,.55);margin:0 0 22px;}

  .inp{
    display:flex;align-items:center;gap:12px;height:56px;padding:0 17px;border-radius:16px;margin-bottom:13px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.06);
    transition:border-color .18s, box-shadow .18s, background .18s;
  }
  .inp:focus-within{border-color:rgba(240,197,107,.7);background:rgba(255,255,255,.09);
    box-shadow:0 0 0 4px rgba(213,162,60,.16), inset 0 1px 2px rgba(0,0,0,.2);}
  .inp .i{color:rgba(240,197,107,.85);flex:0 0 20px;display:flex;}
  .inp input{flex:1;border:none;outline:none;background:transparent;font-size:16.5px;color:#fff;font-family:inherit;}
  .inp input::placeholder{color:rgba(234,244,242,.4);}

  .btn{
    width:100%;height:56px;border:none;border-radius:17px;margin-top:9px;cursor:pointer;
    font-size:16.5px;font-weight:800;letter-spacing:.06em;color:#3a2a07;
    background:linear-gradient(180deg,#F5D77E 0%,#E9C56B 44%,#cf9a30 100%);
    box-shadow:0 14px 30px rgba(213,162,60,.42), inset 0 1px 0 rgba(255,255,255,.65), inset 0 -3px 8px rgba(140,95,10,.35);
    transition:transform .12s, box-shadow .12s;
  }
  .btn:active{transform:translateY(2px);}
  svg{display:block;}
</style>
</head>
<body>
  <div class="phone">
    <div class="orb a"></div><div class="orb b"></div>
    <span class="sparkle" style="top:120px;left:40px"></span>
    <span class="sparkle" style="top:80px;right:56px;opacity:.5"></span>
    <span class="sparkle" style="top:180px;right:30px;width:3px;height:3px"></span>

    <div class="wrap">
      <div class="emblem">
        <div class="vip">VIP</div>
        <img src="assets/logo-color.png" alt="MFORMULA"
          onerror="this.outerHTML='<div style=&quot;font-size:26px;font-weight:900;color:#fff;letter-spacing:2px&quot;>MFORMULA<div style=&quot;font-size:9px;color:#E9C56B;letter-spacing:3px&quot;>by natureLISH</div></div>'">
      </div>

      <div class="card">
        <div class="h-row"><h1>会员登入</h1><span class="tag">★ 老顾客专属</span></div>
        <div class="sub">填名字 + 电话即可进入</div>

        <div class="inp">
          <span class="i"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>
          <input type="text" placeholder="您的姓名">
        </div>
        <div class="inp">
          <span class="i"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L20 13l1 4v3a1 1 0 0 1-1 1A16 16 0 0 1 4 5a1 1 0 0 1 1-1z"/></svg></span>
          <input type="tel" placeholder="012-345 6789">
        </div>

        <button class="btn">进入活动 →</button>
      </div>
    </div>
  </div>
</body>
</html>
