<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>登录界面·Liquid Glass 方案</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html{height:100%;}
  body{
    min-height:100vh;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;align-items:flex-start;justify-content:center;padding:44px 24px 40px;position:relative;overflow-x:hidden;
    background-color:#0a2730;
    background:
      radial-gradient(46% 30% at 50% 3%, rgba(240,197,107,.32) 0%, transparent 60%),
      radial-gradient(64% 42% at 10% 20%, rgba(45,120,140,.5) 0%, transparent 60%),
      radial-gradient(58% 40% at 94% 26%, rgba(213,162,60,.16) 0%, transparent 56%),
      radial-gradient(90% 55% at 50% 118%, rgba(31,125,142,.55) 0%, transparent 60%),
      radial-gradient(70% 40% at 84% 92%, rgba(213,162,60,.16) 0%, transparent 58%),
      linear-gradient(172deg,#0e3a48 0%,#0E3947 26%,#0c313d 60%,#0a2932 100%);
  }
  .phone{width:100%;max-width:400px;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
  .sparkle{position:absolute;border-radius:50%;background:#f4d488;box-shadow:0 0 9px 1px rgba(244,212,136,.7);z-index:0;}

  /* ===== VIP member emblem ===== */
  .emblem{text-align:center;margin:2px 0 22px;}
  .medal{width:142px;height:142px;display:block;margin:0 auto 12px;
    filter:drop-shadow(0 10px 22px rgba(0,0,0,.5)) drop-shadow(0 0 24px rgba(240,197,107,.22));}
  .emblem img{width:230px;height:auto;filter:drop-shadow(0 8px 18px rgba(0,0,0,.4));}

  /* ===== liquid glass card ===== */
  .card{
    position:relative;width:100%;padding:28px 24px 26px;border-radius:30px;overflow:hidden;
    background:linear-gradient(160deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,.055) 42%, rgba(255,255,255,.03) 100%);
    border:1px solid rgba(255,255,255,.17);
    box-shadow:0 30px 60px rgba(0,0,0,.42), 0 2px 0 rgba(255,255,255,.1) inset, 0 -18px 40px rgba(0,0,0,.08) inset;
    backdrop-filter:blur(42px) saturate(1.6);-webkit-backdrop-filter:blur(42px) saturate(1.6);
  }
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,.02) 60%, transparent 100%);
    border-radius:30px 30px 55% 55%;}
  .card > *{position:relative;z-index:1;}

  .h-row{display:flex;align-items:center;gap:11px;margin-bottom:5px;}
  .h-row h1{font-size:30px;font-weight:800;color:#fff;letter-spacing:.05em;}
  .tag{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:#3a2a07;padding:5px 11px;border-radius:100px;
    background:linear-gradient(100deg,#F3E0B0,#E9C56B);box-shadow:0 3px 10px rgba(213,162,60,.32);white-space:nowrap;}
  .sub{font-size:13px;color:rgba(234,244,242,.55);margin:0 0 22px;}

  .inp{
    display:flex;align-items:center;gap:12px;height:56px;padding:0 17px;border-radius:16px;margin-bottom:13px;
    background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.14);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.06);
    transition:border-color .18s, box-shadow .18s, background .18s;
  }
  .inp:focus-within{border-color:rgba(240,197,107,.7);background:rgba(255,255,255,.1);
    box-shadow:0 0 0 4px rgba(213,162,60,.16), inset 0 1px 2px rgba(0,0,0,.18);}
  .inp .i{color:rgba(240,197,107,.85);flex:0 0 20px;display:flex;}
  .inp input{flex:1;border:none;outline:none;background:transparent;font-size:16.5px;color:#fff;font-family:inherit;}
  .inp input::placeholder{color:rgba(234,244,242,.4);}

  .btn{
    width:100%;height:56px;border:none;border-radius:17px;margin-top:9px;cursor:pointer;
    font-size:16.5px;font-weight:800;letter-spacing:.06em;color:#3a2a07;
    background:linear-gradient(180deg,#F5D77E 0%,#E9C56B 44%,#cf9a30 100%);
    box-shadow:0 14px 30px rgba(213,162,60,.42), inset 0 1px 0 rgba(255,255,255,.65), inset 0 -3px 8px rgba(140,95,10,.35);
    transition:transform .12s;
  }
  .btn:active{transform:translateY(2px);}
  svg{display:block;}
</style>
</head>
<body>
  <span class="sparkle" style="width:5px;height:5px;top:150px;left:52px;opacity:.7"></span>
  <span class="sparkle" style="width:4px;height:4px;top:100px;right:64px;opacity:.5"></span>
  <span class="sparkle" style="width:3px;height:3px;top:210px;right:40px;opacity:.6"></span>
  <span class="sparkle" style="width:4px;height:4px;bottom:120px;left:44px;opacity:.45"></span>

  <div class="phone">
    <div class="emblem">
      <svg class="medal" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="VIP">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCEFB8"/><stop offset=".36" stop-color="#F0C56B"/><stop offset=".68" stop-color="#D2A038"/><stop offset="1" stop-color="#9E7A22"/></linearGradient>
          <linearGradient id="g2" x1="0" y1="0" x2=".4" y2="1"><stop offset="0" stop-color="#FFF6D2"/><stop offset=".28" stop-color="#EFC768"/><stop offset=".52" stop-color="#B8862A"/><stop offset=".76" stop-color="#F3D583"/><stop offset="1" stop-color="#96731f"/></linearGradient>
          <radialGradient id="core" cx=".5" cy=".4" r=".72"><stop offset="0" stop-color="#20404c"/><stop offset="1" stop-color="#091820"/></radialGradient>
          <path id="st" d="M0,-9 L2.6,-2.8 L9,-2.8 L3.9,1.1 L5.3,7.3 L0,3.6 L-5.3,7.3 L-3.9,1.1 L-9,-2.8 L-2.6,-2.8 Z"/>
        </defs>
        <circle cx="100" cy="100" r="95" fill="url(#g2)"/>
        <circle cx="100" cy="100" r="83" fill="url(#core)"/>
        <circle cx="100" cy="100" r="79" fill="none" stroke="url(#g1)" stroke-width="2.4"/>
        <path d="M100 33 l8 11 10-8 -2.5 17 h-31 l-2.5-17 10 8 z" fill="url(#g1)"/>
        <use href="#st" fill="url(#g1)" transform="translate(71,76) scale(.72)"/>
        <use href="#st" fill="url(#g1)" transform="translate(100,69) scale(.92)"/>
        <use href="#st" fill="url(#g1)" transform="translate(129,76) scale(.72)"/>
        <text x="101" y="141" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="700" fill="url(#g1)" letter-spacing="1">VIP</text>
        <use href="#st" fill="url(#g1)" transform="translate(85,162) scale(.42)"/>
        <use href="#st" fill="url(#g1)" transform="translate(100,165) scale(.5)"/>
        <use href="#st" fill="url(#g1)" transform="translate(115,162) scale(.42)"/>
      </svg>
      <img src="assets/logo-hero.png" alt="MFORMULA by natureLISH"
        onerror="this.outerHTML='<div style=&quot;font-size:26px;font-weight:900;color:#fff;letter-spacing:2px&quot;>MFORMULA<div style=&quot;font-size:9px;color:#E9C56B;letter-spacing:3px&quot;>by natureLISH</div></div>'">
    </div>

    <div class="card">
      <div class="h-row"><h1>会员登入</h1><span class="tag">★ 老顾客专属</span></div>
      <div class="sub">填名字 + 电话即可进入</div>

      <div class="inp">
        <span class="i"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>
        <input type="text" placeholder="您的姓名">
      </div>
      <div class="inp">
        <span class="i"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L20 13l1 4v3a1 1 0 0 1-1 1A16 16 0 0 1 4 5a1 1 0 0 1 1-1z"/></svg></span>
        <input type="tel" placeholder="012-345 6789">
      </div>

      <button class="btn">进入活动 →</button>
    </div>
  </div>
</body>
</html>
